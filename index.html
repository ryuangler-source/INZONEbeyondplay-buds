<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>ModelViewerを使ったWebARページ</title>
  <style>
    /* 3D表示エリアのサイズ設定 */
    model-viewer {
      width: 800px;
      height: 1000px;
      background-color: #FFFFFF; /* 背景色はstyleに書くのが正解です */
      position: relative;
    }

    /* ★自作したARボタンのスタイル設定 */
    #my-ar-button {
      background-color: #ffffff;
      border-radius: 8px;
      border: 2px solid #4285f4;
      color: #4285f4;
      position: absolute;
      bottom: 24px;  /* 下からの位置 */
      right: 24px;   /* 右からの位置 */
      
      /* ここでサイズを自由に変更できます */
      padding: 15px 30px;  /* ボタン内の余白（大きくする） */
      font-size: 20px;     /* 文字のサイズ */
      font-weight: bold;
      
      cursor: pointer;
      box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.15);
    }
    
    #my-ar-button:active {
      background-color: #f1f3f4;
    }
  </style>
</head>
<body>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    
  <model-viewer  
    ar
    alt="Leoモデル"
    src="Buds.glb" 
    ios-src="Buds.usdz" 
    shadow-intensity="0.7"
    camera-controls
    interaction-prompt="auto"
    auto-rotate>

    <button slot="ar-button" id="my-ar-button">
      空間で見る (AR)
    </button>

  </model-viewer>
</body>
</html>
